<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Capture [Захват]</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-top-row">
            <!-- Иконка настроек (шестерёнка) -->
            <div class="settings-gear" id="settingsIcon">⚙️</div>
            
            <div class="left-panel">
                <div class="score-panel" id="sideScorePanel"></div>
                <div class="turn-counter-box">Ход: <span id="turnCountDisplay">0</span></div>
                <div class="timer-box">⏱️ Время: <span id="timerDisplay">00:00</span></div>
                <button id="resetBtnLeft" class="reset-button">🔄 Новая игра</button>
            </div>
            <canvas id="gameCanvas" width="780" height="560" role="img" aria-label="Игровое поле"></canvas>
        </div>
        
        <!-- Информация под canvas -->
        <div class="canvas-info">
            <div class="field-size-label" id="fieldSizeLabel">Стандартное поле (39×28)</div>
            <div class="bots-label" id="botsLabel">🤖 Игра с ботами</div>
        </div>
        
        <div class="info-panel">
            <div class="turn-indicator" id="turnText">Игрок 1 (ход)</div>
            <div class="dice-area" id="diceDisplay">🎲  ?  ?  🎲</div>
            <div class="controls">
                <button id="rollBtn" aria-label="Бросить кубики">🎲 Бросить кубики</button>
                <button id="skipBtn" aria-label="Пропустить ход">⏭ Пропустить ход</button>
            </div>
            <div class="message" id="msgArea">Нажмите "Бросить кубики"</div>
        </div>
    </div>
</div>

<!-- Модальное окно настроек -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Настройки игры</h3>
            <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body">
            <!-- Размер поля -->
            <div class="settings-group">
                <label>Размер поля:</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="fieldSize" value="standard" checked> Стандартный (39×28)</label>
                    <label class="radio-label"><input type="radio" name="fieldSize" value="custom"> Кастомный</label>
                </div>
                <div id="customSizeInputs" class="custom-size-inputs" style="display: none;">
                    <input type="number" id="customCols" min="4" max="100" value="39" step="1"> ×
                    <input type="number" id="customRows" min="4" max="100" value="28" step="1">
                </div>
            </div>
            
            <!-- Боты -->
            <div class="settings-group">
                <label for="botsToggle">🤖 Режим ботов:</label>
                <label class="switch">
                    <input type="checkbox" id="botsToggle" checked>
                    <span class="slider round"></span>
                </label>
                <span id="botsStatusText">(игроки 2,3,4 — боты)</span>
            </div>
            
            <!-- Цветовые режимы для дальтонизма (стилизованные радио) -->
            <div class="settings-group">
                <label>Цветовой режим:</label>
                <div class="radio-group colorblind-group">
                    <label class="radio-label"><input type="radio" name="colorMode" value="normal" checked> Обычный</label>
                    <label class="radio-label"><input type="radio" name="colorMode" value="protanopia"> Протанопия</label>
                    <label class="radio-label"><input type="radio" name="colorMode" value="deuteranopia"> Дейтеранопия</label>
                    <label class="radio-label"><input type="radio" name="colorMode" value="tritanopia"> Тританопия</label>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button id="applySettingsBtn">Применить и перезапустить</button>
            <button id="cancelSettingsBtn">Отмена</button>
        </div>
    </div>
</div>

<script src="js/scripts.js"></script>
</body>
</html>
