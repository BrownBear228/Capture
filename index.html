<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Capture [Захват]</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <!-- Вся область справа от панели счёта (или с панелью внутри) -->
        <div class="canvas-area">
            <!-- Верхняя строка: панель счёта + canvas -->
            <div class="game-top-row">
                <div class="score-panel" id="sideScorePanel"></div>
                <canvas id="gameCanvas" width="750" height="500" role="img" aria-label="Игровое поле 39x28 клеток"></canvas>
            </div>
            <!-- Информационная панель внизу на всю ширину -->
            <div class="info-panel">
                <div class="turn-indicator" id="turnText">Игрок 1 (красный)</div>
                <div class="dice-area" id="diceDisplay">🎲  ?  ?  🎲</div>
                <div class="controls">
                    <button id="rollBtn" aria-label="Бросить кубики">🎲 Бросить кубики</button>
                    <button id="skipBtn" aria-label="Пропустить ход">⏭ Пропустить ход</button>
                    <button id="cancelBtn" aria-label="Отменить выбор">✖ Отменить выбор</button>
                    <button id="resetBtn" aria-label="Новая игра">🔄 Новая игра</button>
                </div>
                <div class="message" id="msgArea">Нажмите "Бросить кубики"</div>
            </div>
        </div>
    </div>
</div>

<script src="js/scripts.js"></script>
</body>
</html>
